version: '3.8'

services:
  propoj-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propoj.app
    restart: always
    ports:
      - "8080:80"
    networks:
      - appwrite

  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: propoj.sidecar
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - APPWRITE_ENDPOINT=${VITE_APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${VITE_APPWRITE_PROJECT_ID}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
    networks:
      - appwrite

networks:
  appwrite:
    external: true
